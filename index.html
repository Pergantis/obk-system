<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oslo Biljardklubb - System</title>
    
    <!-- Henter biblioteker -->
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    
    <!-- Henter utseende (CSS) -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="sync-loader">Synkroniserer...</div>

    <nav>
        <div class="logo-area">
            <img src="https://images.squarespace-cdn.com/content/v1/5f1ea20392e2991054b38d3f/1596796347854-Y9E9R9R6X9R9R9R9R9R9/logo.png" alt="OBK Logo" onerror="this.style.display='none';">
        </div>
        <button class="nav-btn active" id="btn-bord" onclick="showModule('bord')">🎱 BORDLEIE</button>
        <button class="nav-btn" id="btn-medlem" onclick="showModule('medlem')">👤 PERIODEKORT</button>
        <button class="nav-btn" id="btn-skap" onclick="showModule('skap')">🔐 SKAPLEIE</button>
    </nav>

    <main>
        <div id="error-log"></div>

        <!-- MODULER (Innholdet her fylles av de andre filene) -->
        <section id="mod-bord" class="module active">
            <h1>Bordkontroll</h1>
            <div id="bord-grid" class="card-grid">Laster bord...</div>
        </section>

        <section id="mod-medlem" class="module">
            <h1>Periodekort Administrasjon</h1>
            <div id="medlem-content"></div> <!-- Fylles av members.js -->
        </section>

        <section id="mod-skap" class="module">
            <h1>Skaputleie</h1>
            <div id="skap-content"></div> <!-- Fylles av lockers.js -->
        </section>
    </main>

    <!-- Felles modal for Bordleie -->
    <div id="modal-overlay"></div>

    <!-- Henter logikken (Viktig rekkefølge!) -->
    <script src="app.js"></script>
    <script src="tables.js"></script>
    <script src="members.js"></script>
    <script src="lockers.js"></script>
</body>
</html>
