<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oslo Biljardklubb - System</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --marine: #1a2f3c; --gull: #c9a84c; --biljard-gronn: #27ae60;
            --biljard-blaa: #2980b9; --krem: #f5f0e8; --advarsel: #e74c3c;
            --hvit: #ffffff;
        }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--krem); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        nav { width: 220px; background: var(--marine); color: white; padding: 20px; border-right: 4px solid var(--gull); flex-shrink: 0; }
        .nav-btn { width: 100%; padding: 12px; margin: 10px 0; background: none; border: 1px solid var(--gull); color: white; cursor: pointer; border-radius: 8px; font-weight: bold; text-align: left; }
        .nav-btn:hover { background: var(--gull); color: var(--marine); }
        .nav-btn.active { background: var(--gull); color: var(--marine); }

        main { flex: 1; padding: 25px; overflow-y: auto; position: relative; }
        .module { display: none; }
        .module.active { display: block; }
        
        .card { background: var(--hvit); padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); border-top: 5px solid #ddd; margin-bottom: 20px; }
        .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; }
        
        .p-container { display: flex; gap: 20px; }
        .p-box { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); border-top: 5px solid #eee; }

        .btn { width: 100%; padding: 10px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; color: white; text-transform: uppercase; font-size: 13px; margin-top: 5px; }
        .name-in { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; margin-bottom: 10px; font-size: 14px; }
        label { display: block; font-size: 11px; font-weight: bold; color: #666; text-transform: uppercase; margin-bottom: 4px; }
        .req { color: var(--advarsel); } /* Rød stjerne for obligatoriske felt */
        
        .search-item { padding: 12px; border: 1px solid #eee; border-radius: 8px; margin-top: 8px; cursor: pointer; text-align: left; }
        .search-item:hover { border-color: var(--gull); background: #fdfaf0; }

        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 12px; border-bottom: 2px solid #eee; color: #666; font-size: 11px; text-transform: uppercase; }
        td { padding: 12px; border-bottom: 1px solid #eee; font-size: 13px; }
        
        .dager-ok { color: var(--biljard-gronn); font-weight: bold; }
        .dager-advarsel { color: #f39c12; font-weight: bold; }
        .dager-utlopt { color: var(--advarsel); font-weight: bold; }

        #modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.92); z-index: 10000; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 40px; border-radius: 20px; text-align: center; width: 350px; color: #333; }
        .big-minutes { display: block; font-size: 90px; font-weight: 900; color: var(--advarsel); margin: 15px 0; }

        #error-log { color: red; background: #ffdada; padding: 15px; border-radius: 8px; display: none; margin-bottom: 20px; border: 1px solid red; }
        #sync-loader { position: fixed; top: 10px; right: 20px; background: orange; color: white; padding: 5px 15px; border-radius: 20px; font-size: 12px; display: none; }
    </style>
</head>
<body>

<div id="sync-loader">Synkroniserer...</div>

<nav>
    <div style="text-align: center; margin-bottom: 20px;">
        <img src="https://images.squarespace-cdn.com/content/v1/5f1ea20392e2991054b38d3f/1596796347854-Y9E9R9R6X9R9R9R9R9R9/logo.png" 
             style="width: 120px; height: auto;" onerror="this.style.display='none';">
    </div>
    <button class="nav-btn active" id="btn-bord" onclick="showModule('bord')">🎱 BORDLEIE</button>
    <button class="nav-btn" id="btn-medlem" onclick="showModule('medlem')">👤 PERIODEKORT</button>
    <button class="nav-btn" id="btn-skap" onclick="showModule('skap')">🔐 SKAPLEIE</button>
</nav>

<main>
    <div id="error-log"></div>

    <!-- MODUL: BORDLEIE -->
    <div id="mod-bord" class="module active">
        <h1>Bordkontroll</h1>
        <div id="bord-grid" class="card-grid">Laster bord...</div>
    </div>

    <!-- MODUL: PERIODEKORT -->
    <div id="mod-medlem" class="module">
        <h1>Periodekort Administrasjon</h1>
        <div class="p-container">
            <div style="flex: 1;">
                <div class="p-box" style="border-top-color: var(--biljard-blaa);">
                    <h3 style="margin-top:0;">Finn Medlem</h3>
                    <input type="text" id="p-search-input" placeholder="Mobil eller etternavn..." class="name-in" onkeyup="if(event.key==='Enter') runSearch()">
                    <button class="btn" style="background: var(--marine)" onclick="runSearch()">SØK</button>
                    <div id="p-search-results" style="margin-top: 15px;"></div>
                </div>

                <!-- Skjema for eksisterende medlem -->
                <div id="p-form-box" class="p-box" style="display:none; margin-top: 20px; border-top-color: var(--gull);">
                    <h3 id="p-display-name" style="margin-top:0; color: var(--marine);">Navn</h3>
                    <p id="p-current-status" style="font-size: 12px; background: #eee; padding: 8px; border-radius: 5px; margin-bottom: 15px;"></p>
                    
                    <label>E-post <span class="req">*</span></label>
                    <input type="email" id="p-edit-email" class="name-in">
                    <label>Mobilnummer <span class="req">*</span></label>
                    <input type="tel" id="p-edit-phone" class="name-in">
                    
                    <div style="background: #fff9e6; padding: 10px; border-radius: 8px; border: 1px solid #ffe4b3; margin-top: 10px;">
                        <label>Nytt periodekort (valgfritt)</label>
                        <div style="display: flex; gap: 10px;">
                            <div style="flex:1"><label>Start</label><input type="date" id="p-start-date" class="name-in"></div>
                            <div style="flex:1"><label>Slutt</label><input type="date" id="p-end-date" class="name-in"></div>
                        </div>
                    </div>
                    
                    <button class="btn" style="background: var(--biljard-gronn); padding: 15px;" onclick="saveMemberPassUpdate()">LAGRE ENDRINGER & KORT</button>
                    <button class="btn" style="background: #95a5a6; margin-top: 10px;" onclick="cancelSelection()">AVBRYT</button>
                </div>

                <!-- Skjema for helt nytt medlem -->
                <div id="p-new-member-box" class="p-box" style="display:none; margin-top: 20px; border-top-color: var(--marine);">
                    <h3 style="margin-top:0;">Registrer Nytt Medlem</h3>
                    <label>Fornavn <span class="req">*</span></label>
                    <input type="text" id="n-fn" placeholder="Fornavn" class="name-in">
                    <label>Etternavn <span class="req">*</span></label>
                    <input type="text" id="n-en" placeholder="Etternavn" class="name-in">
                    <label>E-post <span class="req">*</span></label>
                    <input type="email" id="n-email" placeholder="E-post" class="name-in">
                    <label>Mobilnummer <span class="req">*</span></label>
                    <input type="tel" id="n-phone" placeholder="Mobilnummer" class="name-in">
                    
                    <div style="background: #eef7ff; padding: 10px; border-radius: 8px; border: 1px solid #cfe3ff; margin-top: 10px;">
                        <label>Periodekort (valgfritt)</label>
                        <div style="display: flex; gap: 10px;">
                            <div style="flex:1"><label>Start</label><input type="date" id="n-start" class="name-in"></div>
                            <div style="flex:1"><label>Slutt</label><input type="date" id="n-end" class="name-in"></div>
                        </div>
                    </div>
                    <button class="btn" style="background: var(--marine); padding: 15px;" onclick="registerBrandNewMember()">LAGRE MEDLEM</button>
                    <button class="btn" style="background: #95a5a6; margin-top: 10px;" onclick="cancelSelection()">AVBRYT</button>
                </div>
            </div>

            <!-- HØYRE: Oversikt over aktive -->
            <div style="flex: 1.5;">
                <div class="p-box" style="border-top-color: var(--biljard-gronn);">
                    <h3 style="margin-top:0;">Aktive Periodekort</h3>
                    <table>
                        <thead><tr><th>Navn</th><th>Mobil</th><th>Utløper</th><th>Dager</th></tr></thead>
                        <tbody id="p-active-table-body"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- MODUL: SKAP -->
    <div id="mod-skap" class="module"><h1>Skapleie</h1><p>Under utvikling...</p></div>
</main>

<!-- STOPP-MODAL -->
<div id="modal-overlay">
    <div class="modal-content">
        <h2 id="modal-title">BORD FERDIG</h2>
        <div style="display: flex; align-items: baseline; justify-content: center; gap: 5px; color: var(--advarsel);">
            <span class="big-minutes" id="modal-minutes">0</span><span style="font-size: 30px; font-weight: bold;">min</span>
        </div>
        <div id="modal-player" style="font-weight: bold; margin-bottom: 20px;">👤 Spiller</div>
        <button class="btn" style="background:var(--biljard-gronn); padding: 15px;" onclick="confirmStop()">BEKREFT OG LAGRE</button>
        <button class="btn" style="background:#95a5a6" onclick="closeModal()">AVBRYT</button>
    </div>
</div>

<script>
    const SB_URL = "https://xsakmdmhpuqjebcqrony.supabase.co"; 
    const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhzYWttZG1ocHVxamViY3Fyb255Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgzMzAzNzYsImV4cCI6MjA5MzkwNjM3Nn0.E6s11F_894jwxfaQoE4rfSX8oPtgi1DSeYOsyON1DB4";
    let sb;
    let tableData = [];
    let currentStoppingId = null;
    let selectedMemberId = null;

    async function startSystem() {
        try {
            if (!window.supabase) return;
            sb = window.supabase.createClient(SB_URL, SB_KEY);
            loadTables();
            loadActivePasses();
            setInterval(loadTables, 10000);
            setInterval(loadActivePasses, 30000);
        } catch (err) { console.error(err); }
    }

    // --- BORDLEIE ---
    async function loadTables() {
        const { data, error } = await sb.from('bord_status').select('*').order('bord_nummer');
        if (!error) { tableData = data; renderGrid(); }
    }

    function renderGrid() {
        const grid = document.getElementById('bord-grid');
        if (!grid) return;
        grid.innerHTML = tableData.map(b => {
            const isActive = b.status === 'Opptatt';
            const diff = b.start_tid ? Math.floor((new Date() - new Date(b.start_tid)) / 60000) : 0;
            const btnColor = b.bord_nummer <= 10 ? 'var(--biljard-blaa)' : (b.bord_nummer <= 16 ? '#6D8196' : '#CAC254');
            return `
                <div class="card ${isActive ? 'active' : ''}">
                    <h3 style="margin:0; font-size:14px;">Bord ${b.bord_nummer}</h3>
                    <div style="font-size:22px; font-weight:900; margin:8px 0; color:var(--marine)">${isActive ? diff + ' min' : 'LEDIG'}</div>
                    ${isActive ? `<div style="font-size:11px; color:var(--biljard-gronn); font-weight:bold; height:18px; overflow:hidden;">👤 ${b.kunde_navn || ''}</div>` : 
                    `<input type="text" id="name-${b.bord_nummer}" class="name-in" style="font-size:12px; margin-bottom:5px;" placeholder="Spiller valgfritt">`}
                    <button class="btn" style="background:${isActive ? 'var(--advarsel)' : btnColor}" 
                        onclick="${isActive ? `openModal(${b.bord_nummer}, '${b.start_tid}', '${b.kunde_navn}')` : `startTable(${b.bord_nummer})`}">
                        ${isActive ? 'STOPP' : 'START'}
                    </button>
                </div>`;
        }).join('');
    }

    async function startTable(id) {
        const name = document.getElementById(`name-${id}`).value;
        await sb.from('bord_status').update({ status: 'Opptatt', start_tid: new Date().toISOString(), kunde_navn: name }).eq('bord_nummer', id);
        loadTables();
    }

    function openModal(id, start, name) {
        currentStoppingId = id;
        const diff = Math.max(1, Math.floor((new Date() - new Date(start)) / 60000));
        document.getElementById('modal-minutes').innerText = diff;
        document.getElementById('modal-player').innerText = "👤 " + (name !== 'null' ? name : 'Anonym');
        document.getElementById('modal-overlay').style.display = 'flex';
    }

    async function confirmStop() {
        await sb.from('bord_status').update({ status: 'Ledig', start_tid: null, kunde_navn: null }).eq('bord_nummer', currentStoppingId);
        document.getElementById('modal-overlay').style.display = 'none';
        loadTables();
    }

    function closeModal() { document.getElementById('modal-overlay').style.display = 'none'; }

    // --- PERIODEKORT ---

    async function runSearch() {
        const input = document.getElementById('p-search-input').value.trim();
        const resDiv = document.getElementById('p-search-results');
        if (input.length < 2) return;
        resDiv.innerHTML = "Søker...";
        const { data, error } = await sb.from('medlemmer').select('*').or(`tlf_mobil.ilike.%${input}%,etternavn.ilike.%${input}%`).limit(5);
        if (error) { resDiv.innerHTML = "Feil: " + error.message; return; }
        if (data.length === 0) {
            resDiv.innerHTML = `
                <div style="padding:10px; color:var(--advarsel); font-weight:bold;">Ingen funnet.</div>
                <button class="btn" style="background:var(--marine)" onclick="showNewMemberBox('${input}')">+ REGISTRER NYTT MEDLEM</button>
            `;
            return;
        }
        resDiv.innerHTML = data.map(m => `
            <div class="search-item" onclick="selectMemberForPass('${m.id}', '${m.fornavn} ${m.etternavn}', '${m.epost}', '${m.tlf_mobil}')">
                <strong>${m.fornavn} ${m.etternavn}</strong><br><small>📱 ${m.tlf_mobil} | 📧 ${m.epost}</small>
            </div>`).join('');
    }

    async function selectMemberForPass(id, name, epost, tlf) {
        selectedMemberId = id;
        cancelSelection(); 
        document.getElementById('p-display-name').innerText = "👤 " + name;
        document.getElementById('p-edit-email').value = epost;
        document.getElementById('p-edit-phone').value = tlf;
        const { data } = await sb.from('periodekort').select('slutt_dato').eq('medlem_id', id).order('slutt_dato', { ascending: false }).limit(1);
        const statusEl = document.getElementById('p-current-status');
        if (data && data.length > 0) {
            const utlop = new Date(data[0].slutt_dato);
            statusEl.innerText = "Nåværende kort utløper: " + utlop.toLocaleDateString('no-NO');
            statusEl.style.color = utlop >= new Date() ? "green" : "red";
        } else {
            statusEl.innerText = "Medlemmet har ingen registrerte kort fra før.";
            statusEl.style.color = "#666";
        }
        document.getElementById('p-start-date').value = "";
        document.getElementById('p-end-date').value = "";
        document.getElementById('p-form-box').style.display = 'block';
        document.getElementById('p-search-results').innerHTML = "";
    }

    async function saveMemberPassUpdate() {
        if (!selectedMemberId) return;
        const nEmail = document.getElementById('p-edit-email').value;
        const nPhone = document.getElementById('p-edit-phone').value;
        const nStart = document.getElementById('p-start-date').value;
        const nSlutt = document.getElementById('p-end-date').value;

        if (!nEmail || !nPhone) { alert("E-post og mobil er obligatorisk."); return; }

        showLoader(true);
        await sb.from('medlemmer').update({ epost: nEmail, tlf_mobil: nPhone }).eq('id', selectedMemberId);
        if (nStart && nSlutt) {
            await sb.from('periodekort').insert({ medlem_id: selectedMemberId, start_dato: nStart, slutt_dato: nSlutt });
            alert("Lagret!");
        } else if (nStart || nSlutt) {
            alert("Begge datoer må fylles ut for periodekort. Kun medlemsinfo ble oppdatert.");
        } else {
            alert("Medlemsinfo oppdatert.");
        }
        showLoader(false);
        cancelSelection();
        loadActivePasses();
    }

    function showNewMemberBox(input) {
        cancelSelection();
        document.getElementById('p-new-member-box').style.display = 'block';
        document.getElementById('p-search-results').innerHTML = "";
        if (!isNaN(input)) document.getElementById('n-phone').value = input;
        else document.getElementById('n-en').value = input;
    }

    async function registerBrandNewMember() {
        const fn = document.getElementById('n-fn').value.trim();
        const en = document.getElementById('n-en').value.trim();
        const ep = document.getElementById('n-email').value.trim();
        const ph = document.getElementById('n-phone').value.trim();
        const st = document.getElementById('n-start').value;
        const sl = document.getElementById('n-end').value;

        // VALIDERINGS-LOGIKK: Sjekk at alle medlemsfelt er fylt ut
        if (!fn || !en || !ep || !ph) { 
            alert("Fornavn, Etternavn, E-post og Mobilnummer er obligatoriske felt."); 
            return; 
        }

        showLoader(true);
        const { data, error } = await sb.from('medlemmer').insert({ fornavn: fn, etternavn: en, epost: ep, tlf_mobil: ph }).select();
        
        if (!error && data) {
            // Sjekk om datoene er fylt ut for valgfritt periodekort
            if (st && sl) {
                await sb.from('periodekort').insert({ medlem_id: data[0].id, start_dato: st, slutt_dato: sl });
                alert("Nytt medlem registrert med periodekort!");
            } else {
                alert("Nytt medlem registrert (uten periodekort).");
            }
        } else {
            alert("Feil ved lagring: " + (error ? error.message : "Ukjent feil"));
        }

        showLoader(false);
        cancelSelection();
        loadActivePasses();
    }

    async function loadActivePasses() {
        const today = new Date().toISOString().split('T')[0];
        const { data, error } = await sb.from('periodekort')
            .select('slutt_dato, medlemmer(fornavn, etternavn, tlf_mobil)')
            .gte('slutt_dato', today)
            .order('slutt_dato', { ascending: true });

        if (error) return;
        const tbody = document.getElementById('p-active-table-body');
        if (!data || data.length === 0) {
            tbody.innerHTML = "<tr><td colspan='4'>Ingen aktive kort.</td></tr>";
            return;
        }
        tbody.innerHTML = data.map(p => {
            const slutt = new Date(p.slutt_dato);
            const dager = Math.ceil((slutt - new Date().setHours(0,0,0,0)) / 86400000);
            let klasse = dager <= 7 ? "dager-advarsel" : "dager-ok";
            if (dager <= 0) klasse = "dager-utlopt";
            return `<tr><td><strong>${p.medlemmer.fornavn} ${p.medlemmer.etternavn}</strong></td><td>${p.medlemmer.tlf_mobil}</td><td>${slutt.toLocaleDateString('no-NO')}</td><td class="${klasse}">${dager <= 0 ? 'Siste dag!' : dager + ' dager'}</td></tr>`;
        }).join('');
    }

    function cancelSelection() {
        document.getElementById('p-form-box').style.display = 'none';
        document.getElementById('p-new-member-box').style.display = 'none';
        selectedMemberId = null;
        // Tømmer felter i ny-medlem boks
        document.querySelectorAll('#p-new-member-box input').forEach(i => i.value = "");
    }

    function showModule(id) {
        document.querySelectorAll('.module').forEach(m => m.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('mod-' + id).classList.add('active');
        document.getElementById('btn-' + id).classList.add('active');
    }

    function showLoader(show) { document.getElementById('sync-loader').style.display = show ? 'block' : 'none'; }
    window.addEventListener('load', startSystem);
</script>
</body>
</html>
