<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oslo Biljardklubb - System</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --marine: #1a2f3c; --gull: #c9a84c; --biljard-gronn: #27ae60;
            --biljard-blaa: #2980b9; --krem: #f5f0e8; --advarsel: #e74c3c;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--krem); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        nav { width: 220px; background: var(--marine); color: white; padding: 20px; border-right: 4px solid var(--gull); }
        .nav-btn { width: 100%; padding: 12px; margin: 10px 0; background: none; border: 1px solid var(--gull); color: white; cursor: pointer; border-radius: 8px; font-weight: bold; text-align: left; }
        .nav-btn:hover { background: var(--gull); color: var(--marine); }

        main { flex: 1; padding: 25px; overflow-y: auto; }
        .module { display: none; }
        .module.active { display: block; }
        
        .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; }
        .card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); border-top: 8px solid #ddd; text-align: center; }
        .card.active { border-top-color: var(--biljard-gronn); background: #fafffa; }
        
        .timer { font-size: 24px; font-weight: bold; color: var(--marine); margin: 10px 0; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; color: white; text-transform: uppercase; }
        
        #error-display { color: red; background: #ffdada; padding: 15px; border-radius: 8px; border: 1px solid red; margin-bottom: 20px; display: none; }
        
        /* MODAL */
        #modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 10000; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 40px; border-radius: 20px; text-align: center; width: 350px; color: #333; }
        .big-minutes { display: block; font-size: 90px; font-weight: 900; color: var(--advarsel); margin: 10px 0; }
    </style>
</head>
<body>

<nav>
    <div style="text-align:center; margin-bottom:20px;">
        <h2 style="color:var(--gull); margin:0;">OBK SYSTEM</h2>
    </div>
    <button class="nav-btn" onclick="showModule('bord')">🎱 BORDLEIE</button>
    <button class="nav-btn" onclick="showModule('medlem')">👤 MEDLEMMER</button>
    <button class="nav-btn" onclick="showModule('skap')">🔐 SKAPLEIE</button>
</nav>

<main>
    <div id="error-display"></div>

    <div id="mod-bord" class="module active">
        <h1>Bordkontroll</h1>
        <div id="bord-grid" class="card-grid">Venter på database...</div>
    </div>

    <div id="mod-medlem" class="module"><h1>Medlemsregister</h1><p>Kommer snart...</p></div>
    <div id="mod-skap" class="module"><h1>Skapleie</h1><p>Kommer snart...</p></div>
</main>

<div id="modal-overlay">
    <div class="modal-content">
        <h2>BORD FERDIG</h2>
        <span class="big-minutes" id="modal-minutes">0</span>
        <p>MINUTTER</p>
        <button class="btn" style="background:var(--biljard-gronn); margin-bottom:10px;" onclick="confirmStop()">BEKREFT</button>
        <button class="btn" style="background:#95a5a6" onclick="closeModal()">AVBRYT</button>
    </div>
</div>

<script>
    // === SETT INN DINE DATA HER ===
    const SUPABASE_URL = "https://xsakmdmhpuqjebcqrony.supabase.co"; 
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhzYWttZG1ocHVxamViY3Fyb255Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgzMzAzNzYsImV4cCI6MjA5MzkwNjM3Nn0.E6s11F_894jwxfaQoE4rfSX8oPtgi1DSeYOsyON1DB4";
    // ==============================

    let supabase;
    let tableStates = [];
    let currentStoppingId = null;

    function showError(msg) {
        const errDiv = document.getElementById('error-display');
        errDiv.innerText = "FEILMELDING: " + msg;
        errDiv.style.display = "block";
    }

    async function init() {
        try {
            if (!window.supabase) {
                showError("Supabase-biblioteket ble ikke lastet. Sjekk internett.");
                return;
            }
            supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
            await loadTables();
            
            // Start automatisk oppdatering hvert 5. sekund
            setInterval(loadTables, 5000);
            // Oppdater klokkene hvert minutt
            setInterval(render, 60000);
            
        } catch (e) {
            showError("Feil under oppstart: " + e.message);
        }
    }

    async function loadTables() {
        const { data, error } = await supabase.from('bord_status').select('*').order('bord_nummer');
        if (error) {
            showError("Kunne ikke hente bord: " + error.message);
            return;
        }
        if (!data || data.length === 0) {
            showError("Fant ingen bord i tabellen 'bord_status'.");
            return;
        }
        tableStates = data;
        render();
    }

    function render() {
        const grid = document.getElementById('bord-grid');
        grid.innerHTML = tableStates.map(b => {
            const isActive = b.status === 'Opptatt';
            const startTime = b.start_tid ? new Date(b.start_tid) : null;
            const diffMin = startTime ? Math.floor((new Date() - startTime) / 60000) : 0;
            const btnColor = b.bord_nummer <= 10 ? 'var(--biljard-blaa)' : (b.bord_nummer <= 16 ? '#6D8196' : '#CAC254');

            return `
                <div class="card ${isActive ? 'active' : ''}">
                    <h3>Bord ${b.bord_nummer}</h3>
                    <div class="timer">${isActive ? diffMin + ' min' : 'LEDIG'}</div>
                    ${isActive ? `<div style="font-size:12px; color:#27ae60; font-weight:bold; height:18px;">${b.kunde_navn || ''}</div>` : 
                    `<input type="text" id="name-${b.bord_nummer}" style="width:100%; margin-bottom:5px;" placeholder="Navn">`}
                    
                    <button class="btn" 
                        style="background:${isActive ? 'var(--advarsel)' : btnColor}" 
                        onclick="${isActive ? `openModal(${b.bord_nummer}, '${b.start_tid}')` : `startTable(${b.bord_nummer})`}">
                        ${isActive ? 'STOPP' : 'START'}
                    </button>
                </div>
            `;
        }).join('');
    }

    async function startTable(id) {
        const name = document.getElementById(`name-${id}`).value;
        const { error } = await supabase.from('bord_status').update({ 
            status: 'Opptatt', start_tid: new Date().toISOString(), kunde_navn: name 
        }).eq('bord_nummer', id);
        if(error) showError("Klarte ikke starte bord: " + error.message);
        loadTables();
    }

    function openModal(id, startTime) {
        currentStoppingId = id;
        const start = new Date(startTime);
        const diff = Math.max(1, Math.round((new Date() - start) / 60000));
        document.getElementById('modal-minutes').innerText = diff;
        document.getElementById('modal-overlay').style.display = 'flex';
    }

    async function confirmStop() {
        const { error } = await supabase.from('bord_status').update({ 
            status: 'Ledig', start_tid: null, kunde_navn: null 
        }).eq('bord_nummer', currentStoppingId);
        if(error) showError("Klarte ikke stoppe bord: " + error.message);
        closeModal();
        loadTables();
    }

    function closeModal() { document.getElementById('modal-overlay').style.display = 'none'; }
    
    function showModule(id) {
        document.querySelectorAll('.module').forEach(m => m.classList.remove('active'));
        document.getElementById('mod-' + id).classList.add('active');
    }

    // Start systemet
    init();
</script>
</body>
</html>
