<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oslo Biljardklubb - System</title>
    
    <!-- Supabase-biblioteket -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --marine: #1a2f3c;
            --gull: #c9a84c;
            --biljard-gronn: #27ae60;
            --biljard-blaa: #2980b9;
            --krem: #f5f0e8;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--krem); margin: 0; display: flex; height: 100vh; }
        
        /* Navigasjon */
        nav { width: 220px; background: var(--marine); color: white; padding: 20px; border-right: 4px solid var(--gull); flex-shrink: 0; }
        .nav-btn { width: 100%; padding: 12px; margin: 10px 0; background: none; border: 1px solid var(--gull); color: white; cursor: pointer; border-radius: 8px; font-weight: bold; text-align: left; }
        
        /* Hovedområde */
        main { flex: 1; padding: 25px; overflow-y: auto; }
        .module { display: none; }
        .module.active { display: block; }
        
        /* Bord-kortene */
        .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 15px; }
        .card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); border-top: 8px solid #ddd; text-align: center; transition: 0.3s; }
        .card.active { border-top-color: var(--biljard-gronn); background: #fafffa; }
        
        /* Tid og navn styling */
        .timer-text { font-size: 24px; font-weight: 900; color: var(--marine); margin: 10px 0; }
        .name-display { font-weight: bold; color: var(--biljard-gronn); font-size: 14px; margin-bottom: 10px; height: 1.2em; }
        
        /* Inputfelt for navn */
        .name-input { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 5px; margin-bottom: 10px; box-sizing: border-box; text-align: center; }

        .btn { width: 100%; padding: 12px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; color: white; text-transform: uppercase; }
        
        #error-log { color: red; background: #ffdada; padding: 15px; border-radius: 8px; display: none; margin-bottom: 20px; border: 1px solid red; }
    </style>
</head>
<body>

<nav>
    <div style="text-align: center; margin-bottom: 20px;">
        <h2 style="color:var(--gull); margin:0;">OBK SYSTEM</h2>
    </div>
    <button class="nav-btn" onclick="showModule('bord')">🎱 BORDLEIE</button>
    <button class="nav-btn" onclick="showModule('medlem')">👤 MEDLEMMER</button>
    <button class="nav-btn" onclick="showModule('skap')">🔐 SKAPLEIE</button>
</nav>

<main>
    <div id="error-log"></div>
    
    <div id="mod-bord" class="module active">
        <h1 id="status-text">Kobler til bordkontroll...</h1>
        <div id="bord-grid" class="card-grid"></div>
    </div>

    <div id="mod-medlem" class="module"><h1>Medlemsregister</h1><p>Kommer i et senere steg...</p></div>
    <div id="mod-skap" class="module"><h1>Skapleie</h1><p>Kommer i et senere steg...</p></div>
</main>

<script>
    const SUPABASE_URL = "https://xsakmdmhpuqjebcqrony.supabase.co"; 
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhzYWttZG1ocHVxamViY3Fyb255Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgzMzAzNzYsImV4cCI6MjA5MzkwNjM3Nn0.E6s11F_894jwxfaQoE4rfSX8oPtgi1DSeYOsyON1DB4";

    let sbClient;
    let tableData = []; // Her lagrer vi informasjonen fra databasen lokalt i programmet

    async function startSystem() {
        try {
            if (!window.supabase) return;
            sbClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
            
            // Vi henter data første gang
            await loadTables();

            // --- NYTT I STEG 2: AUTO-OPPDATERING ---
            // Vi henter nye data fra Supabase hvert 10. sekund (slik at alle skjermer er like)
            setInterval(loadTables, 10000);

            // Vi oppdaterer minuttene på skjermen hvert 30. sekund (uten å spørre databasen)
            // Dette gjør at klokka tikker fremover selv om du ikke trykker på noe
            setInterval(renderGrid, 30000);

        } catch (err) {
            showError(err.message);
        }
    }

    // Funksjon for å hente rådata fra Supabase
    async function loadTables() {
        const { data, error } = await sbClient
            .from('bord_status')
            .select('*')
            .order('bord_nummer', { ascending: true });

        if (error) {
            showError("Databasefeil: " + error.message);
        } else {
            tableData = data; // Lagre dataene i vår lokale liste
            renderGrid();     // Tegn bordene på skjermen
        }
    }

    // Funksjon for å tegne bordene (HTML) basert på informasjonen vi har
    function renderGrid() {
        const grid = document.getElementById('bord-grid');
        document.getElementById('status-text').innerText = "Bordoversikt";
        
        grid.innerHTML = tableData.map(b => {
            const isActive = b.status === 'Opptatt';
            
            // --- NYTT I STEG 2: TIDSBEREGNING ---
            let minutter = 0;
            if (isActive && b.start_tid) {
                const start = new Date(b.start_tid);
                const naa = new Date();
                // Regner ut differansen i millisekunder og gjør om til hele minutter
                minutter = Math.floor((naa - start) / 60000);
            }

            return `
                <div class="card ${isActive ? 'active' : ''}">
                    <h3 style="margin:0;">Bord ${b.bord_nummer}</h3>
                    
                    <div class="timer-text">
                        ${isActive ? minutter + ' min' : 'LEDIG'}
                    </div>

                    <div class="name-display">
                        ${isActive ? '👤 ' + (b.kunde_navn || 'Anonym') : ''}
                    </div>
                    
                    <!-- Hvis ledig: Vis inputfelt. Hvis opptatt: Skjul det. -->
                    ${!isActive ? `<input type="text" id="name-in-${b.bord_nummer}" class="name-input" placeholder="Navn på kunde">` : ''}
                    
                    <button class="btn" 
                        style="background:${isActive ? '#e74c3c' : '#2980b9'}" 
                        onclick="${isActive ? `stopTable(${b.bord_nummer})` : `startTable(${b.bord_nummer})`}">
                        ${isActive ? 'STOPP' : 'START'}
                    </button>
                </div>
            `;
        }).join('');
    }

    // --- NYTT I STEG 2: LAGRE NAVN VED START ---
    async function startTable(nummer) {
        // Hent navnet fra tekstfeltet til det aktuelle bordet
        const nameField = document.getElementById('name-in-' + nummer);
        const kundenavn = nameField ? nameField.value.trim() : "";

        const { error } = await sbClient
            .from('bord_status')
            .update({ 
                status: 'Opptatt',
                start_tid: new Date().toISOString(),
                kunde_navn: kundenavn // Lagrer navnet i databasen
            })
            .eq('bord_nummer', nummer);

        if (error) showError(error.message);
        else await loadTables();
    }

    async function stopTable(nummer) {
        const { error } = await sbClient
            .from('bord_status')
            .update({ 
                status: 'Ledig',
                start_tid: null,
                kunde_navn: null 
            })
            .eq('bord_nummer', nummer);

        if (error) showError(error.message);
        else await loadTables();
    }

    function showModule(id) {
        document.querySelectorAll('.module').forEach(m => m.classList.remove('active'));
        document.getElementById('mod-' + id).classList.add('active');
    }

    function showError(msg) {
        const log = document.getElementById('error-log');
        log.innerText = "FEIL: " + msg;
        log.style.display = 'block';
    }

    window.addEventListener('load', startSystem);
</script>

</body>
</html>
