<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <title>OBK System - Enkel test</title>
    <!-- Vi bruker en annen kilde for biblioteket som ofte er mer stabil -->
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; background: #f5f0e8; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; }
        .card { background: white; padding: 20px; border-radius: 10px; border-top: 5px solid #ccc; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        #status { padding: 15px; margin-bottom: 20px; background: #fff; border: 2px solid #1a2f3c; font-weight: bold; }
    </style>
</head>
<body>

    <div id="status">Venter på at koden skal starte...</div>
    
    <div id="bord-grid" class="grid"></div>

    <script>
        // FORSØK PÅ Å STARTE MED EN GANG
        document.getElementById('status').innerHTML = "🚀 Koden har startet! Prøver å koble til Supabase...";

        // === DINE DATA ===
        const SB_URL = "https://xsakmdmhpuqjebcqrony.supabase.co"; 
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhzYWttZG1ocHVxamViY3Fyb255Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgzMzAzNzYsImV4cCI6MjA5MzkwNjM3Nn0.E6s11F_894jwxfaQoE4rfSX8oPtgi1DSeYOsyON1DB4";
        // =================

        async function init() {
            const statusEl = document.getElementById('status');
            
            try {
                // Sjekk om biblioteket er der
                if (typeof window.supabase === 'undefined') {
                    statusEl.innerHTML = "❌ FEIL: Supabase-biblioteket ble ikke lastet ned fra nettet.";
                    return;
                }

                statusEl.innerHTML = "🔗 Kobler til databasen...";
                const supabase = window.supabase.createClient(SB_URL, SB_KEY);

                statusEl.innerHTML = "📥 Henter data fra 'bord_status'...";
                const { data, error } = await supabase
                    .from('bord_status')
                    .select('*')
                    .order('bord_nummer', { ascending: true });

                if (error) {
                    statusEl.innerHTML = "❌ DATABASE-FEIL: " + error.message;
                    return;
                }

                if (!data || data.length === 0) {
                    statusEl.innerHTML = "❓ FANTASTISK: Koblingen virker, men tabellen er helt tom!";
                    return;
                }

                statusEl.innerHTML = "✅ SUKSESS! Viser " + data.length + " bord.";
                
                const grid = document.getElementById('bord-grid');
                grid.innerHTML = data.map(b => `
                    <div class="card" style="border-top-color: ${b.status === 'Opptatt' ? '#27ae60' : '#ddd'}">
                        <h3>Bord ${b.bord_nummer}</h3>
                        <p>${b.status}</p>
                    </div>
                `).join('');

            } catch (err) {
                statusEl.innerHTML = "💥 KRITISK FEIL: " + err.message;
            }
        }

        // Vi kjører funksjonen manuelt
        init();
    </script>
</body>
</html>
