<!-- MODUL: SKAPLEIE -->
<section id="mod-skap" class="module">
    <h1>Skaputleie</h1>
    <div class="p-container">
        <!-- VENSTRE: Kartet over 100 skap -->
        <div style="flex: 1;">
            <div class="p-box" style="border-top-color: var(--marine);">
                <h3>Oversikt (1-100)</h3>
                <p style="font-size: 11px; color: #666; margin-bottom: 10px;">Grønn = Ledig | Rød = Opptatt</p>
                <div class="locker-grid" id="locker-grid-visual"></div>
            </div>
        </div>

        <!-- HØYRE: Kontrollpanel for valgt skap -->
        <div style="flex: 0.8;">
            <div id="locker-panel" class="p-box" style="display:none; border-top-color: var(--gull);">
                <h2 id="selected-locker-title" style="margin-top:0;">Skap X</h2>
                
                <!-- Skjema for utleie (vises når skapet er ledig) -->
                <div id="locker-rent-form" style="display:none;">
                    <label>Søk leietager (Mobil/Etternavn)</label>
                    <input type="text" id="locker-search-input" class="name-in" onkeyup="searchMemberForLocker()">
                    <div id="locker-search-results"></div>
                    
                    <div id="locker-final-fields" style="display:none; margin-top:15px; padding-top:15px; border-top:1px solid #eee;">
                        <p id="locker-target-name" style="font-weight:bold; color:var(--marine);"></p>
                        <div style="display:flex; gap:10px;">
                            <div style="flex:1;"><label>Fra</label><input type="date" id="locker-start" class="name-in"></div>
                            <div style="flex:1;"><label>Til</label><input type="date" id="locker-end" class="name-in"></div>
                        </div>
                        <label>Notater (viktig)</label>
                        <input type="text" id="locker-note" class="name-in" placeholder="F.eks. Kø-merke, betaling...">
                        <button class="btn" style="background:var(--biljard-gronn)" onclick="saveLockerLease()">BEKREFT UTLEIE</button>
                    </div>
                </div>

                <!-- Info-panel (vises når skapet er opptatt) -->
                <div id="locker-info-panel" style="display:none;">
                    <div style="background:#fff5f5; padding:15px; border-radius:8px; border:1px solid #fed7d7; margin-bottom:15px;">
                        <label>Leies av:</label>
                        <div id="locker-info-name" style="font-size:18px; font-weight:bold;">-</div>
                        <div id="locker-info-phone" style="color:#666; margin-bottom:10px;">-</div>
                        <div id="locker-info-dates" style="font-size:13px;">-</div>
                    </div>
                    <label>Notater:</label>
                    <p id="locker-info-note" style="background:#f9f9f9; padding:10px; border-radius:4px; font-style:italic; font-size:13px;"></p>
                    <button class="btn" style="background:var(--advarsel); padding:15px; margin-top:10px;" onclick="releaseLocker()">FRIGJØR SKAP / TØM</button>
                </div>
            </div>
            <p id="locker-msg" style="color:#999; text-align:center; margin-top:50px;">Klikk på et skap for å se detaljer.</p>
        </div>
    </div>
</section>
