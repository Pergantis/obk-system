<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oslo Biljardklubb - System</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --marine: #1a2f3c; --gull: #c9a84c; --biljard-gronn: #27ae60;
            --biljard-blaa: #2980b9; --krem: #f5f0e8; --advarsel: #e74c3c;
            --hvit: #ffffff;
        }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--krem); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* Navigasjon */
        nav { width: 220px; background: var(--marine); color: white; padding: 20px; border-right: 4px solid var(--gull); flex-shrink: 0; }
        .nav-btn { width: 100%; padding: 12px; margin: 10px 0; background: none; border: 1px solid var(--gull); color: white; cursor: pointer; border-radius: 8px; font-weight: bold; text-align: left; }
        .nav-btn:hover { background: var(--gull); color: var(--marine); }
        .nav-btn.active { background: var(--gull); color: var(--marine); }

        /* Hovedområde */
        main { flex: 1; padding: 25px; overflow-y: auto; position: relative; }
        .module { display: none; }
        .module.active { display: block; }
        
        /* Kort og Grid */
        .card { background: var(--hvit); padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); border-top: 6px solid #ddd; margin-bottom: 20px; }
        .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; }
        
        /* Medlems-modul spesifikk layout */
        .medlem-layout { display: flex; gap: 25px; align-items: flex-start; }
        .medlem-venstre { flex: 1; max-width: 450px; }
        .medlem-hoyre { flex: 1.5; }

        /* Skjema-elementer */
        .search-box { display: flex; gap: 10px; margin-bottom: 20px; }
        input[type="text"], input[type="email"], input[type="date"], input[type="tel"] { 
            width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 14px; margin-bottom: 10px;
        }
        label { display: block; font-size: 12px; font-weight: bold; color: var(--marine); margin-bottom: 4px; text-transform: uppercase; }
        
        /* Tabell for aktive kort */
        table { width: 100%; border-collapse: collapse; background: var(--hvit); font-size: 14px; }
        th { background: var(--marine); color: var(--gull); text-align: left; padding: 12px; font-size: 12px; text-transform: uppercase; }
        td { padding: 12px; border-bottom: 1px solid #eee; }
        tr:hover { background: #f9f9f9; }

        /* Dager igjen farger */
        .dager-ok { color: var(--biljard-gronn); font-weight: bold; }
        .dager-advarsel { color: #f39c12; font-weight: bold; }
        .dager-utlopt { color: var(--advarsel); font-weight: bold; }

        /* Knapper */
        .btn { padding: 10px 15px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; color: white; text-transform: uppercase; font-size: 13px; }
        .btn-full { width: 100%; margin-top: 10px; }

        /* MODAL */
        #modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.92); z-index: 10000; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 40px; border-radius: 20px; text-align: center; width: 350px; }
        .big-minutes { display: block; font-size: 80px; font-weight: 900; color: var(--advarsel); margin: 10px 0; }
    </style>
</head>
<body>

<nav>
    <div style="text-align: center; margin-bottom: 20px;">
        <img src="https://images.squarespace-cdn.com/content/v1/5f1ea20392e2991054b38d3f/1596796347854-Y9E9R9R6X9R9R9R9R9R9/logo.png" 
             alt="OBK Logo" style="width: 120px; height: auto;" 
             onerror="this.style.display='none';">
    </div>
    <button class="nav-btn" id="btn-bord" onclick="showModule('bord')">🎱 BORDLEIE</button>
    <button class="nav-btn" id="btn-medlem" onclick="showModule('medlem')">👤 MEDLEMMER</button>
    <button class="nav-btn" id="btn-skap" onclick="showModule('skap')">🔐 SKAPLEIE</button>
</nav>

<main>
    <!-- MODUL: BORDLEIE (Allerede ferdig) -->
    <div id="mod-bord" class="module active">
        <h1 id="headline">Bordkontroll</h1>
        <div id="bord-grid" class="card-grid">Laster bord...</div>
    </div>

    <!-- MODUL: MEDLEMMER (STEG 4 PUNKT 1) -->
    <div id="mod-medlem" class="module">
        <h1>Medlemsregister & Periodekort</h1>
        
        <div class="medlem-layout">
            
            <!-- Venstre side: Søk og Skjema -->
            <div class="medlem-venstre">
                <div class="card" style="border-top-color: var(--biljard-blaa)">
                    <label>Søk på mobil eller etternavn</label>
                    <div class="search-box">
                        <input type="text" id="member-search-input" placeholder="Skriv her..." onkeypress="if(event.key==='Enter') searchMember()">
                        <button class="btn" style="background: var(--marine)" onclick="searchMember()">SØK</button>
                    </div>
                    <div id="search-results-area"></div>
                </div>

                <!-- Skjema for Periodekort (Skjult til medlem er valgt) -->
                <div id="pass-form-area" class="card" style="border-top-color: var(--gull); display: none;">
                    <h3 id="form-title">Periodekort for Navn</h3>
                    <label>Startdato</label>
                    <input type="date" id="pass-start">
                    <label>Sluttdato</label>
                    <input type="date" id="pass-end">
                    <button class="btn btn-full" style="background: var(--biljard-gronn)" onclick="savePass()">AKTIVER / FORNY KORT</button>
                </div>

                <!-- Skjema for Nytt Medlem (Skjult til man trykker "Ny") -->
                <div id="new-member-area" class="card" style="border-top-color: var(--marine); display: none;">
                    <h3>Registrer Nytt Medlem</h3>
                    <input type="text" id="new-fn" placeholder="Fornavn">
                    <input type="text" id="new-en" placeholder="Etternavn">
                    <input type="email" id="new-email" placeholder="E-post">
                    <input type="tel" id="new-phone" placeholder="Mobilnummer">
                    <button class="btn btn-full" style="background: var(--marine)" onclick="createNewMember()">LAGRE MEDLEM</button>
                </div>
            </div>

            <!-- Høyre side: Aktive Periodekort -->
            <div class="medlem-hoyre">
                <div class="card" style="border-top-color: var(--biljard-gronn)">
                    <h3>Aktive Periodekort</h3>
                    <div style="overflow-x: auto;">
                        <table>
                            <thead>
                                <tr>
                                    <th>Navn</th>
                                    <th>Mobil</th>
                                    <th>Utløper</th>
                                    <th>Status</th>
                                </tr>
                            </thead>
                            <tbody id="active-passes-table">
                                <!-- Her fylles listen i neste punkt -->
                                <tr><td colspan="4">Laster aktive kort...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <!-- MODUL: SKAP -->
    <div id="mod-skap" class="module"><h1>Skapleie</h1><p>Kommer i Steg 5...</p></div>
</main>

<!-- STOPP-MODAL (For bordleie) -->
<div id="modal-overlay">
    <div class="modal-content">
        <h2 id="modal-title">BORD FERDIG</h2>
        <div style="color: var(--advarsel); display: flex; align-items: baseline; justify-content: center; gap: 5px;">
            <span class="big-minutes" id="modal-minutes">0</span>
            <span style="font-size: 30px; font-weight: bold;">min</span>
        </div>
        <div id="modal-player" style="font-weight: bold; margin-bottom: 20px;">👤 Navn</div>
        <button class="btn btn-full" style="background:var(--biljard-gronn)" onclick="confirmStop()">BEKREFT OG FRIGJØR</button>
        <button class="btn btn-full" style="background:#95a5a6" onclick="closeModal()">AVBRYT</button>
    </div>
</div>

<script>
    const SB_URL = "https://xsakmdmhpuqjebcqrony.supabase.co"; 
    const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhzYWttZG1ocHVxamViY3Fyb255Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgzMzAzNzYsImV4cCI6MjA5MzkwNjM3Nn0.E6s11F_894jwxfaQoE4rfSX8oPtgi1DSeYOsyON1DB4";
    const supabase = window.supabase.createClient(SB_URL, SB_KEY);

    let tableData = [];
    let currentStoppingId = null;

    // --- GENERELLE FUNKSJONER ---
    function showModule(id) {
        document.querySelectorAll('.module').forEach(m => m.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('mod-' + id).classList.add('active');
        document.getElementById('btn-' + id).classList.add('active');
        if(id === 'bord') loadData();
        if(id === 'medlem') loadActivePasses();
    }

    // --- BORDLEIE LOGIKK (Allerede testet) ---
    async function loadData() {
        const { data } = await supabase.from('bord_status').select('*').order('bord_nummer');
        if (data) { tableData = data; renderGrid(); }
    }

    function renderGrid() {
        const grid = document.getElementById('bord-grid');
        if (!grid) return;
        grid.innerHTML = tableData.map(b => {
            const isActive = b.status === 'Opptatt';
            const diffMin = b.start_tid ? Math.floor((new Date() - new Date(b.start_tid)) / 60000) : 0;
            const btnColor = b.bord_nummer <= 10 ? 'var(--biljard-blaa)' : (b.bord_nummer <= 16 ? '#6D8196' : '#CAC254');
            return `
                <div class="card ${isActive ? 'active' : ''}">
                    <h3 style="margin:0; font-size:16px;">Bord ${b.bord_nummer}</h3>
                    <div style="font-size:22px; font-weight:900; margin:10px 0; color:var(--marine)">${isActive ? diffMin + ' min' : 'LEDIG'}</div>
                    ${isActive ? `<div style="font-size:11px; color:var(--biljard-gronn); font-weight:bold; height:18px;">👤 ${b.kunde_navn || 'Aktiv'}</div>` : 
                    `<input type="text" id="name-${b.bord_nummer}" placeholder="Spiller valgfritt" style="width:100%; padding:5px; font-size:12px; border:1px solid #ddd; border-radius:4px; margin-bottom:5px;">`}
                    <button class="btn btn-full" style="background:${isActive ? 'var(--advarsel)' : btnColor}" 
                        onclick="${isActive ? `openModal(${b.bord_nummer}, '${b.start_tid}', '${b.kunde_navn}')` : `startTable(${b.bord_nummer})`}">
                        ${isActive ? 'STOPP' : 'START'}
                    </button>
                </div>
            `;
        }).join('');
    }

    async function startTable(id) {
        const name = document.getElementById(`name-${id}`).value;
        await supabase.from('bord_status').update({ status: 'Opptatt', start_tid: new Date().toISOString(), kunde_navn: name }).eq('bord_nummer', id);
        loadData();
    }

    function openModal(id, start, name) {
        currentStoppingId = id;
        const diff = Math.max(1, Math.floor((new Date() - new Date(start)) / 60000));
        document.getElementById('modal-minutes').innerText = diff;
        document.getElementById('modal-player').innerText = "👤 " + (name !== 'null' ? name : 'Anonym');
        document.getElementById('modal-overlay').style.display = 'flex';
    }

    async function confirmStop() {
        await supabase.from('bord_status').update({ status: 'Ledig', start_tid: null, kunde_navn: null }).eq('bord_nummer', currentStoppingId);
        document.getElementById('modal-overlay').style.display = 'none';
        loadData();
    }

    function closeModal() { document.getElementById('modal-overlay').style.display = 'none'; }

    // --- MEDLEMS-LOGIKK (PLAN LAGT - KODE KOMMER I NESTE PUNKT) ---
    async function searchMember() { console.log("Søkestart..."); }
    async function loadActivePasses() { console.log("Laster aktive kort..."); }

    // Start
    window.onload = () => { loadData(); showModule('bord'); };
    setInterval(loadData, 10000);
</script>
</body>
</html>
