<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oslo Biljardklubb - System</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --marine: #1a2f3c;
            --gull: #c9a84c;
            --biljard-gronn: #27ae60;
            --biljard-blaa: #2980b9;
            --krem: #f5f0e8;
            --advarsel: #e74c3c;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--krem); margin: 0; display: flex; height: 100vh; }
        
        /* Navigasjon */
        nav { width: 220px; background: var(--marine); color: white; padding: 20px; border-right: 4px solid var(--gull); flex-shrink: 0; }
        .nav-btn { width: 100%; padding: 12px; margin: 10px 0; background: none; border: 1px solid var(--gull); color: white; cursor: pointer; border-radius: 8px; font-weight: bold; text-align: left; }
        
        /* Hovedområde */
        main { flex: 1; padding: 25px; overflow-y: auto; }
        .module { display: none; }
        .module.active { display: block; }
        
        /* Bord-kortene */
        .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; }
        .card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); border-top: 8px solid #ddd; text-align: center; }
        .card.active { border-top-color: var(--biljard-gronn); background: #fafffa; }
        
        .timer-text { font-size: 24px; font-weight: 900; color: var(--marine); margin: 8px 0; }
        .name-display { font-weight: bold; color: var(--biljard-gronn); font-size: 13px; margin-bottom: 8px; height: 1.2em; overflow: hidden; }
        .name-input { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 5px; margin-bottom: 8px; box-sizing: border-box; text-align: center; font-size: 12px; }

        .btn { width: 100%; padding: 12px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; color: white; text-transform: uppercase; }

        /* ═══ DEN STORE RØDE POP-UPEN (MODAL) ═══ */
        #modal-overlay { 
            display: none; 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.92); 
            z-index: 10000; justify-content: center; align-items: center; 
        }
        .modal-content { 
            background: white; padding: 40px; border-radius: 20px; text-align: center; 
            width: 90%; max-width: 450px; box-shadow: 0 10px 40px rgba(0,0,0,0.5); 
        }
        .modal-title { font-size: 24px; color: #333; margin: 0; text-transform: uppercase; letter-spacing: 1px; }
        
        /* Container for det store tallet og "min" */
        .big-time-wrapper { 
            color: var(--advarsel); 
            margin: 15px 0; 
            display: flex; 
            align-items: baseline; 
            justify-content: center; 
            gap: 10px;
        }
        .big-minutes { font-size: 110px; font-weight: 900; line-height: 1; }
        .min-label { font-size: 40px; font-weight: 700; }

        .modal-player { font-size: 20px; font-weight: bold; color: var(--marine); margin-bottom: 25px; }
        .modal-btns { display: flex; flex-direction: column; gap: 10px; }
        .btn-confirm { background: var(--biljard-gronn); font-size: 18px; padding: 18px; }
        .btn-cancel { background: #95a5a6; }

        #error-log { color: red; background: #ffdada; padding: 15px; border-radius: 8px; display: none; margin-bottom: 20px; }
    </style>
</head>
<body>

<div id="modal-overlay">
    <div class="modal-content">
        <h2 class="modal-title" id="m-title">Bord 1</h2>
        <p style="margin: 10px 0 0 0; color: #666;">Total tid brukt:</p>
        
        <div class="big-time-wrapper">
            <span class="big-minutes" id="m-minutes">0</span>
            <span class="min-label">min</span>
        </div>

        <div class="modal-player" id="m-player">👤 Navn</div>
        <div class="modal-btns">
            <button class="btn btn-confirm" onclick="confirmStop()">BEKREFT OG FRIGJØR BORD</button>
            <button class="btn btn-cancel" onclick="closeModal()">AVBRYT</button>
        </div>
    </div>
</div>

<nav>
    <div style="text-align: center; margin-bottom: 20px;">
        <h2 style="color:var(--gull); margin:0;">OBK SYSTEM</h2>
    </div>
    <button class="nav-btn" onclick="showModule('bord')">🎱 BORDLEIE</button>
    <button class="nav-btn" onclick="showModule('medlem')">👤 MEDLEMMER</button>
    <button class="nav-btn" onclick="showModule('skap')">🔐 SKAPLEIE</button>
</nav>

<main>
    <div id="error-log"></div>
    <div id="mod-bord" class="module active">
        <h1 id="status-text">Bordkontroll</h1>
        <div id="bord-grid" class="card-grid"></div>
    </div>
    <div id="mod-medlem" class="module"><h1>Medlemsregister</h1><p>Under konstruksjon...</p></div>
    <div id="mod-skap" class="module"><h1>Skapleie</h1><p>Under konstruksjon...</p></div>
</main>

<script>
    const SUPABASE_URL = "https://xsakmdmhpuqjebcqrony.supabase.co"; 
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhzYWttZG1ocHVxamViY3Fyb255Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgzMzAzNzYsImV4cCI6MjA5MzkwNjM3Nn0.E6s11F_894jwxfaQoE4rfSX8oPtgi1DSeYOsyON1DB4";

    let sbClient;
    let tableData = [];
    let currentStoppingId = null;

    async function startSystem() {
        try {
            if (!window.supabase) return;
            sbClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
            await loadTables();
            setInterval(loadTables, 8000); 
            setInterval(renderGrid, 30000); 
        } catch (err) { showError(err.message); }
    }

    async function loadTables() {
        const { data, error } = await sbClient.from('bord_status').select('*').order('bord_nummer');
        if (error) showError(error.message);
        else { tableData = data; renderGrid(); }
    }

    function renderGrid() {
        const grid = document.getElementById('bord-grid');
        
        grid.innerHTML = tableData.map(b => {
            const isActive = b.status === 'Opptatt';
            let minutter = 0;
            if (isActive && b.start_tid) {
                minutter = Math.floor((new Date() - new Date(b.start_tid)) / 60000);
            }

            let startBtnColor = 'var(--biljard-blaa)';
            if(b.bord_nummer > 10 && b.bord_nummer <= 16) startBtnColor = '#6D8196';
            if(b.bord_nummer > 16) startBtnColor = '#CAC254';

            return `
                <div class="card ${isActive ? 'active' : ''}">
                    <h3 style="margin:0;">Bord ${b.bord_nummer}</h3>
                    <div class="timer-text">${isActive ? minutter + ' min' : 'LEDIG'}</div>
                    <div class="name-display">${isActive ? '👤 ' + (b.kunde_navn || 'Anonym') : ''}</div>
                    ${!isActive ? `<input type="text" id="name-in-${b.bord_nummer}" class="name-input" placeholder="Spiller valgfritt">` : ''}
                    <button class="btn" 
                        style="background:${isActive ? 'var(--advarsel)' : startBtnColor}" 
                        onclick="${isActive ? `openStopModal(${b.bord_nummer}, '${b.start_tid}', '${b.kunde_navn || 'Anonym'}')` : `startTable(${b.bord_nummer})`}">
                        ${isActive ? 'STOPP' : 'START'}
                    </button>
                </div>
            `;
        }).join('');
    }

    async function startTable(nummer) {
        const nameField = document.getElementById('name-in-' + nummer);
        const kundenavn = nameField ? nameField.value.trim() : "";
        await sbClient.from('bord_status').update({ 
            status: 'Opptatt', start_tid: new Date().toISOString(), kunde_navn: kundenavn 
        }).eq('bord_nummer', nummer);
        await loadTables();
    }

    function openStopModal(nummer, startTid, navn) {
        currentStoppingId = nummer;
        const start = new Date(startTid);
        const naa = new Date();
        const diffMin = Math.max(1, Math.floor((naa - start) / 60000));

        document.getElementById('m-title').innerText = "Bord " + nummer;
        document.getElementById('m-minutes').innerText = diffMin;
        document.getElementById('m-player').innerText = "👤 " + navn;
        document.getElementById('modal-overlay').style.display = 'flex';
    }

    function closeModal() {
        document.getElementById('modal-overlay').style.display = 'none';
        currentStoppingId = null;
    }

    async function confirmStop() {
        if (!currentStoppingId) return;
        const { error } = await sbClient
            .from('bord_status')
            .update({ status: 'Ledig', start_tid: null, kunde_navn: null })
            .eq('bord_nummer', currentStoppingId);

        if (error) showError(error.message);
        else { closeModal(); await loadTables(); }
    }

    function showModule(id) {
        document.querySelectorAll('.module').forEach(m => m.classList.remove('active'));
        document.getElementById('mod-' + id).classList.add('active');
    }

    function showError(msg) {
        const log = document.getElementById('error-log');
        log.innerText = "FEIL: " + msg;
        log.style.display = 'block';
    }

    window.addEventListener('load', startSystem);
</script>

</body>
</html>
