<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oslo Biljardklubb - System</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="sync-loader">Synkroniserer...</div>

<nav>
    <div style="text-align: center; margin-bottom: 20px;">
        <img src="https://images.squarespace-cdn.com/content/v1/5f1ea20392e2991054b38d3f/1596796347854-Y9E9R9R6X9R9R9R9R9R9/logo.png" 
             style="width: 120px; height: auto;" onerror="this.style.display='none';">
    </div>
    <button class="nav-btn active" id="btn-bord" onclick="showModule('bord')">🎱 BORDLEIE</button>
    <button class="nav-btn" id="btn-medlem" onclick="showModule('medlem')">👤 PERIODEKORT</button>
    <button class="nav-btn" id="btn-skap" onclick="showModule('skap')">🔐 SKAPLEIE</button>
</nav>

<main>
    <div id="error-log"></div>

    <!-- MODUL: BORDLEIE -->
    <section id="mod-bord" class="module active">
        <h1>Bordkontroll</h1>
        <div id="bord-grid" class="card-grid">Laster bord...</div>
    </section>

    <!-- MODUL: PERIODEKORT -->
    <section id="mod-medlem" class="module">
        <h1>Periodekort Administrasjon</h1>
        <div class="p-container">
            <div style="flex: 1;">
                <div class="p-box" style="border-top-color: var(--biljard-blaa);">
                    <h3>Finn Medlem</h3>
                    <input type="text" id="p-search-input" placeholder="Mobil eller etternavn..." class="name-in" onkeyup="if(event.key==='Enter') runSearch()">
                    <button class="btn" style="background: var(--marine)" onclick="runSearch()">SØK</button>
                    <div id="p-search-results" style="margin-top:10px;"></div>
                </div>
                <div id="p-form-box" class="p-box" style="display:none; margin-top: 20px; border-top-color: var(--gull);">
                    <h3 id="p-display-name">Navn</h3>
                    <p id="p-current-status"></p>
                    <label>E-post *</label><input type="email" id="p-edit-email" class="name-in">
                    <label>Mobilnummer *</label><input type="tel" id="p-edit-phone" class="name-in">
                    <div style="background: #fff9e6; padding: 10px; border-radius: 8px;">
                        <label>Nytt periodekort</label>
                        <div style="display: flex; gap: 10px;">
                            <input type="date" id="p-start-date" class="name-in">
                            <input type="date" id="p-end-date" class="name-in">
                        </div>
                    </div>
                    <button class="btn" style="background: var(--biljard-gronn)" onclick="saveMemberPassUpdate()">LAGRE</button>
                    <button class="btn" style="background: #95a5a6" onclick="cancelSelection()">AVBRYT</button>
                </div>
                <div id="p-new-member-box" class="p-box" style="display:none; margin-top: 20px; border-top-color: var(--marine);">
                    <h3>Nytt Medlem</h3>
                    <input type="text" id="n-fn" placeholder="Fornavn" class="name-in">
                    <input type="text" id="n-en" placeholder="Etternavn" class="name-in">
                    <input type="email" id="n-email" placeholder="E-post" class="name-in">
                    <input type="tel" id="n-phone" placeholder="Mobil" class="name-in">
                    <button class="btn" style="background: var(--marine)" onclick="registerBrandNewMember()">LAGRE MEDLEM</button>
                    <button class="btn" style="background: #95a5a6" onclick="cancelSelection()">AVBRYT</button>
                </div>
            </div>
            <div style="flex: 1.5;">
                <div class="p-box" style="border-top-color: var(--biljard-gronn);">
                    <h3>Aktive Periodekort</h3>
                    <table>
                        <thead><tr><th>Navn</th><th>Mobil</th><th>Utløper</th><th>Dager</th></tr></thead>
                        <tbody id="p-active-table-body"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </section>

    <!-- MODUL: SKAPLEIE -->
    <section id="mod-skap" class="module">
        <h1>Skaputleie</h1>
        <div class="p-container">
            <div style="flex: 1;">
                <div class="p-box" style="border-top-color: var(--marine);">
                    <h3>Oversikt (1-100)</h3>
                    <div class="locker-grid" id="locker-grid-visual"></div>
                </div>
            </div>
            <div style="flex: 0.8;">
                <div id="locker-panel" class="p-box" style="display:none; border-top-color: var(--gull);">
                    <h2 id="selected-locker-title">Skap X</h2>
                    <div id="locker-rent-form" style="display:none;">
                        <label>Søk leietager</label>
                        <input type="text" id="locker-search-input" class="name-in" onkeyup="searchMemberForLocker()">
                        <div id="locker-search-results"></div>
                        <div id="locker-final-fields" style="display:none; margin-top:15px; border-top:1px solid #eee; padding-top:10px;">
                            <p id="locker-target-name" style="font-weight:bold;"></p>
                            <input type="date" id="locker-start" class="name-in">
                            <input type="date" id="locker-end" class="name-in">
                            <input type="text" id="locker-note" class="name-in" placeholder="Notat">
                            <button class="btn" style="background:var(--biljard-gronn)" onclick="saveLockerLease()">LAGRE UTLEIE</button>
                        </div>
                    </div>
                    <div id="locker-info-panel" style="display:none;">
                        <div style="background:#f0f7ff; padding:15px; border-radius:8px; margin-bottom:10px;">
                            <div id="locker-info-name" style="font-weight:bold; font-size:16px;"></div>
                            <div id="locker-info-phone" style="font-size:13px; color:#666;"></div>
                            <div id="locker-info-dates" style="font-size:13px; margin-top:5px;"></div>
                        </div>
                        <label>Notat:</label>
                        <p id="locker-info-note" style="font-style:italic; font-size:13px;"></p>
                        <button class="btn" style="background:var(--advarsel)" onclick="releaseLocker()">FRIGJØR SKAP</button>
                    </div>
                </div>
                <p id="locker-msg" style="color:#999; text-align:center; margin-top:50px;">Klikk på et skap.</p>
            </div>
        </div>
    </section>
</main>

<div id="modal-overlay">
    <div class="modal-content">
        <h2>BORD FERDIG</h2>
        <div style="display:flex; align-items:baseline; justify-content:center; gap:5px; color:var(--advarsel);">
            <span class="big-minutes" id="modal-minutes">0</span><span style="font-size:30px; font-weight:bold;">min</span>
        </div>
        <div id="modal-player" style="font-weight:bold; margin-bottom:20px;">👤 Spiller</div>
        <button class="btn" style="background:var(--biljard-gronn); padding:15px;" onclick="confirmStop()">BEKREFT</button>
        <button class="btn" style="background:#95a5a6; width:100%;" onclick="closeModal()">AVBRYT</button>
    </div>
</div>

<script src="app.js"></script>
<script src="tables.js"></script>
<script src="members.js"></script>
<script src="lockers.js"></script>
</body>
</html>
