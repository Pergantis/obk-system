<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oslo Biljardklubb</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --marine: #1a2f3c; --gull: #c9a84c; --krem: #f5f0e8; }
        body { font-family: sans-serif; background: var(--krem); margin: 0; display: flex; height: 100vh; }
        nav { width: 200px; background: var(--marine); color: white; padding: 20px; border-right: 4px solid var(--gull); }
        main { flex: 1; padding: 25px; overflow-y: auto; }
        .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; }
        .card { background: white; padding: 15px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); border-top: 5px solid #ccc; text-align: center; }
        .card.active { border-top-color: #27ae60; background: #f0fff0; }
        .btn { width: 100%; padding: 10px; margin-top: 10px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; color: white; }
    </style>
</head>
<body>

<nav>
    <h2 style="color:var(--gull)">OBK ADMIN</h2>
    <p>Bordkontroll</p>
</nav>

<main>
    <h1 id="headline">Laster system...</h1>
    <div id="bord-grid" class="card-grid"></div>
    <div id="error-msg" style="color:red; margin-top:20px;"></div>
</main>

<script>
    // === SETT INN DINE DATA HER ===
    const SB_URL = "https://xsakmdmhpuqjebcqrony.supabase.co"; 
    const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhzYWttZG1ocHVxamViY3Fyb255Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgzMzAzNzYsImV4cCI6MjA5MzkwNjM3Nn0.E6s11F_894jwxfaQoE4rfSX8oPtgi1DSeYOsyON1DB4";
    // ==============================

    const supabase = Object.assign(window.supabase).createClient(SB_URL, SB_KEY);

    async function loadTables() {
        try {
            const { data, error } = await supabase
                .from('bord_status')
                .select('*')
                .order('bord_nummer', { ascending: true });

            if (error) {
                console.error(error);
                document.getElementById('error-msg').innerText = "Database-feil: " + error.message;
                return;
            }

            document.getElementById('headline').innerText = "Bordoversikt";
            const grid = document.getElementById('bord-grid');
            grid.innerHTML = data.map(b => `
                <div class="card ${b.status === 'Opptatt' ? 'active' : ''}">
                    <h3>Bord ${b.bord_nummer}</h3>
                    <div style="font-size: 24px; font-weight: bold; margin: 10px 0;">
                        ${b.status === 'Opptatt' ? 'I BRUK' : 'LEDIG'}
                    </div>
                    <button class="btn" style="background:${b.status === 'Opptatt' ? '#e74c3c' : '#2980b9'}">
                        ${b.status === 'Opptatt' ? 'STOPP' : 'START'}
                    </button>
                </div>
            `).join('');

        } catch (err) {
            document.getElementById('error-msg').innerText = "Kritisk feil: " + err.message;
        }
    }

    // Kjør funksjonen når siden lastes
    loadTables();
</script>

</body>
</html>
