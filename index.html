<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oslo Biljardklubb - System</title>
    
    <!-- Biblioteket som vi vet fungerer stabilt -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --marine: #1a2f3c; --gull: #c9a84c; --biljard-gronn: #27ae60;
            --biljard-blaa: #2980b9; --krem: #f5f0e8; --advarsel: #e74c3c;
            --hvit: #ffffff;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--krem); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* Navigasjon */
        nav { width: 220px; background: var(--marine); color: white; padding: 20px; border-right: 4px solid var(--gull); flex-shrink: 0; }
        .nav-btn { width: 100%; padding: 12px; margin: 10px 0; background: none; border: 1px solid var(--gull); color: white; cursor: pointer; border-radius: 8px; font-weight: bold; text-align: left; }
        .nav-btn:hover { background: var(--gull); color: var(--marine); }
        .nav-btn.active { background: var(--gull); color: var(--marine); }

        /* Hovedområde */
        main { flex: 1; padding: 25px; overflow-y: auto; position: relative; }
        .module { display: none; }
        .module.active { display: block; }
        
        /* Bord-kortene */
        .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; }
        .card { background: var(--hvit); padding: 15px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); border-top: 8px solid #ddd; text-align: center; }
        .card.active { border-top-color: var(--biljard-gronn); background: #fafffa; }
        
        /* Medlemsmodul layout */
        .medlem-container { display: flex; gap: 20px; }
        .medlem-box { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }

        /* Felles styling */
        .timer-text { font-size: 22px; font-weight: 900; color: var(--marine); margin: 8px 0; }
        .btn { width: 100%; padding: 10px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; color: white; text-transform: uppercase; font-size: 13px; margin-top: 5px; }
        .name-in { width: 100%; padding: 5px; margin-bottom: 8px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; text-align: center; }

        /* MODAL */
        #modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.92); z-index: 10000; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 40px; border-radius: 20px; text-align: center; width: 350px; color: #333; }
        .big-minutes { display: block; font-size: 90px; font-weight: 900; color: var(--advarsel); margin: 15px 0; }

        #error-log { color: red; background: #ffdada; padding: 15px; border-radius: 8px; display: none; margin-bottom: 20px; border: 1px solid red; }
    </style>
</head>
<body>

<nav>
    <div style="text-align: center; margin-bottom: 20px;">
        <img src="https://images.squarespace-cdn.com/content/v1/5f1ea20392e2991054b38d3f/1596796347854-Y9E9R9R6X9R9R9R9R9R9/logo.png" 
             style="width: 120px; height: auto;" onerror="this.style.display='none';">
    </div>
    <button class="nav-btn active" id="btn-bord" onclick="showModule('bord')">🎱 BORDLEIE</button>
    <button class="nav-btn" id="btn-medlem" onclick="showModule('medlem')">👤 MEDLEMMER</button>
    <button class="nav-btn" id="btn-skap" onclick="showModule('skap')">🔐 SKAPLEIE</button>
</nav>

<main>
    <div id="error-log"></div>

    <!-- MODUL: BORDLEIE -->
    <div id="mod-bord" class="module active">
        <h1 id="status-text">Laster bordkontroll...</h1>
        <div id="bord-grid" class="card-grid"></div>
    </div>

    <!-- MODUL: MEDLEMSREGISTER -->
    <div id="mod-medlem" class="module">
        <h1>Medlemsregister & Periodekort</h1>
        <div class="medlem-container">
            <div class="medlem-box" style="flex: 1;">
                <h3>Søk Medlem</h3>
                <input type="text" id="member-search" placeholder="Mobil eller etternavn..." class="name-in" style="text-align: left; padding: 10px;">
                <button class="btn" style="background: var(--marine)" onclick="alert('Søkefunksjon kommer i neste steg')">SØK</button>
            </div>
            <div class="medlem-box" style="flex: 2;">
                <h3>Aktive Periodekort</h3>
                <p style="color: #666;">Listen vil vises her.</p>
            </div>
        </div>
    </div>

    <!-- MODUL: SKAP -->
    <div id="mod-skap" class="module">
        <h1>Skapleie</h1>
        <p>Under utvikling...</p>
    </div>
</main>

<!-- STOPP-MODAL -->
<div id="modal-overlay">
    <div class="modal-content">
        <h2 style="margin:0;">BORD FERDIG</h2>
        <div style="display: flex; align-items: baseline; justify-content: center; gap: 5px; color: var(--advarsel);">
            <span class="big-minutes" id="modal-minutes">0</span>
            <span style="font-size: 30px; font-weight: bold;">min</span>
        </div>
        <div id="modal-player" style="font-weight: bold; margin-bottom: 20px;">👤 Spiller</div>
        <button class="btn" style="background:var(--biljard-gronn); padding: 15px;" onclick="confirmStop()">BEKREFT OG LAGRE</button>
        <button class="btn" style="background:#95a5a6" onclick="closeModal()">AVBRYT</button>
    </div>
</div>

<script>
    const SB_URL = "https://xsakmdmhpuqjebcqrony.supabase.co"; 
    const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhzYWttZG1ocHVxamViY3Fyb255Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgzMzAzNzYsImV4cCI6MjA5MzkwNjM3Nn0.E6s11F_894jwxfaQoE4rfSX8oPtgi1DSeYOsyON1DB4";

    let sbClient;
    let tableData = [];
    let currentStoppingId = null;

    // --- 1. OPPSTART (Den stabile metoden) ---
    async function startSystem() {
        try {
            if (!window.supabase) {
                showError("Supabase-biblioteket ble ikke lastet.");
                return;
            }
            sbClient = window.supabase.createClient(SB_URL, SB_KEY);
            await loadTables();
            
            // Start rytmen
            setInterval(loadTables, 10000);
            setInterval(renderGrid, 30000);

        } catch (err) {
            showError("Feil ved oppstart: " + err.message);
        }
    }

    // --- 2. HENTE DATA ---
    async function loadTables() {
        const { data, error } = await sbClient.from('bord_status').select('*').order('bord_nummer');
        if (error) {
            showError("Databasefeil: " + error.message);
        } else {
            tableData = data;
            document.getElementById('status-text').innerText = "Bordkontroll";
            renderGrid();
        }
    }

    // --- 3. TEGNE BORDENE ---
    function renderGrid() {
        const grid = document.getElementById('bord-grid');
        if (!grid) return;
        
        grid.innerHTML = tableData.map(b => {
            const isActive = b.status === 'Opptatt';
            const start = b.start_tid ? new Date(b.start_tid) : null;
            const diff = start ? Math.floor((new Date() - start) / 60000) : 0;
            const btnColor = b.bord_nummer <= 10 ? 'var(--biljard-blaa)' : (b.bord_nummer <= 16 ? '#6D8196' : '#CAC254');

            return `
                <div class="card ${isActive ? 'active' : ''}">
                    <h3 style="margin:0; font-size:14px;">Bord ${b.bord_nummer}</h3>
                    <div class="timer-text">${isActive ? diff + ' min' : 'LEDIG'}</div>
                    ${isActive ? 
                        `<div style="font-size:11px; color:var(--biljard-gronn); font-weight:bold; height:18px; overflow:hidden;">👤 ${b.kunde_navn || 'Aktiv'}</div>` : 
                        `<input type="text" id="name-${b.bord_nummer}" class="name-in" placeholder="Spiller valgfritt">`
                    }
                    <button class="btn" style="background:${isActive ? 'var(--advarsel)' : btnColor}" 
                        onclick="${isActive ? `openModal(${b.bord_nummer}, '${b.start_tid}', '${b.kunde_navn}')` : `startTable(${b.bord_nummer})`}">
                        ${isActive ? 'STOPP' : 'START'}
                    </button>
                </div>
            `;
        }).join('');
    }

    // --- 4. HANDLINGER ---
    async function startTable(id) {
        const name = document.getElementById(`name-${id}`).value;
        await sbClient.from('bord_status').update({ status: 'Opptatt', start_tid: new Date().toISOString(), kunde_navn: name }).eq('bord_nummer', id);
        loadTables();
    }

    function openModal(id, start, name) {
        currentStoppingId = id;
        const diff = Math.max(1, Math.floor((new Date() - new Date(start)) / 60000));
        document.getElementById('modal-minutes').innerText = diff;
        document.getElementById('modal-player').innerText = "👤 " + (name !== 'null' ? name : 'Anonym');
        document.getElementById('modal-overlay').style.display = 'flex';
    }

    async function confirmStop() {
        await sbClient.from('bord_status').update({ status: 'Ledig', start_tid: null, kunde_navn: null }).eq('bord_nummer', currentStoppingId);
        closeModal();
        loadTables();
    }

    function closeModal() { document.getElementById('modal-overlay').style.display = 'none'; }

    // --- 5. NAVIGASJON ---
    function showModule(id) {
        document.querySelectorAll('.module').forEach(m => m.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('mod-' + id).classList.add('active');
        document.getElementById('btn-' + id).classList.add('active');
    }

    function showError(msg) {
        const el = document.getElementById('error-log');
        el.innerText = msg;
        el.style.display = 'block';
    }

    window.addEventListener('load', startSystem);
</script>
</body>
</html>
